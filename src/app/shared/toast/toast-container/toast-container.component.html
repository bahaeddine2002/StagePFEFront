<div class="toast-container" *ngIf="toast">
  <div class="toast" [ngClass]="toast.type">
    <div class="toast-accent"></div>

    <div class="toast-icon">
      <mat-icon *ngIf="toast.type === 'success'">check_circle</mat-icon>
      <mat-icon *ngIf="toast.type === 'error'">error</mat-icon>
    </div>

    <div class="toast-content">
      <div class="toast-title">{{ toast.title }}</div>
      <div class="toast-message">{{ toast.message }}</div>
    </div>

    <button type="button" class="toast-close" (click)="remove()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
</div>
